<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui; padding: 40px; background: #fafafa; }
    .row { display: flex; gap: 40px; align-items: center; }
    svg { background: white; border: 1px solid #ddd; border-radius: 8px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    label { display: block; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="row">
    <svg id="stage" viewBox="0 0 100 100" width="200" height="200">
      <path id="shape"
            d="M50 20 L50 80 M20 50 L80 50"
            stroke="black" stroke-width="8"
            stroke-linecap="round" fill="none"/>
    </svg>

    <!-- hidden reference shapes for morph targets -->
    <svg width="0" height="0" style="position:absolute">
      <path id="plus"  d="M50 20 L50 80 M20 50 L80 50"/>
      <path id="check" d="M25 52 L45 70 L78 35"/>
      <path id="x"     d="M25 25 L75 75 M75 25 L25 75"/>
    </svg>

    <div>
      <button onclick="morphTo('#plus')">plus</button>
      <button onclick="morphTo('#check')">check</button>
      <button onclick="morphTo('#x')">x</button>
      <label>
        duration: <span id="durVal">0.6</span>s
        <input type="range" id="dur" min="0.1" max="3" step="0.1" value="0.6">
      </label>
      <label>
        shapeIndex: <span id="siVal">auto</span>
        <input type="range" id="si" min="-1" max="10" step="1" value="-1">
      </label>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/MorphSVGPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(MorphSVGPlugin);

    const durSlider = document.getElementById('dur');
    const siSlider = document.getElementById('si');
    durSlider.oninput = () => document.getElementById('durVal').textContent = durSlider.value;
    siSlider.oninput  = () => document.getElementById('siVal').textContent =
      siSlider.value === '-1' ? 'auto' : siSlider.value;

    function morphTo(target) {
      const config = {
        duration: parseFloat(durSlider.value),
        morphSVG: target,
        ease: 'power2.inOut'
      };
      if (siSlider.value !== '-1') {
        config.morphSVG = { shape: target, shapeIndex: parseInt(siSlider.value) };
      }
      gsap.to('#shape', config);
    }
  </script>
</body>
</html>
